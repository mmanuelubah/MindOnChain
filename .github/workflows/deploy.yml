name: Deploy MkDocs site

on:
  push:
    branches:
      - main  # Change this if your main branch has a different name

permissions:
  contents: write  # Allow GitHub Actions to push to gh-pages

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Install dependencies
        run: |
          pip install mkdocs-material
          pip install mkdocs-minify-plugin  # Optional if you use it
          pip install mkdocs-git-revision-date-localized-plugin  # Optional
          pip install mkdocs-redirects  # Optional

      - name: Build and deploy
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          mkdocs gh-deploy --force

